<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1a2a4e"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </radialGradient>
    <radialGradient id="moon" cx="0.4" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#7ac8e8"/>
      <stop offset="100%" stop-color="#3a6a8a"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="100" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="400" cy="80" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="150" cy="380" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="420" cy="400" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="80" cy="250" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="440" cy="200" r="1.5" fill="#fff" opacity="0.6"/>
  <!-- Enceladus (moon) -->
  <circle cx="256" cy="280" r="120" fill="url(#moon)"/>
  <!-- Ice surface detail -->
  <path d="M180 300 Q220 280 260 295 Q300 310 340 290" fill="none" stroke="#9ad8f8" stroke-width="1.5" opacity="0.5"/>
  <path d="M200 330 Q240 320 280 335 Q320 345 360 325" fill="none" stroke="#9ad8f8" stroke-width="1" opacity="0.3"/>
  <!-- Geyser plume -->
  <path d="M270 230 Q275 180 280 160 Q282 180 285 230" fill="#aaddf8" opacity="0.4"/>
  <!-- Saturn ring arc (behind moon) -->
  <ellipse cx="350" cy="150" rx="80" ry="12" fill="none" stroke="#c4a35a" stroke-width="3" opacity="0.4" transform="rotate(-20 350 150)"/>
  <!-- Drone -->
  <rect x="200" y="200" width="18" height="9" rx="3" fill="#d55fde"/>
  <circle cx="205" cy="204" r="2" fill="#f0a0f0"/>
  <circle cx="213" cy="204" r="2" fill="#f0a0f0"/>
  <!-- Scan beam from drone -->
  <path d="M209 209 L190 260 L230 260 Z" fill="#d55fde" opacity="0.15"/>
  <!-- Ship silhouette on surface -->
  <rect x="240" y="270" width="30" height="12" rx="3" fill="#555" opacity="0.7" transform="rotate(-5 255 276)"/>
</svg>
