name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      pages_only:
        description: "Deploy pages only (skip build+release)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Detect whether this is a pre-release (beta/rc) or stable tag
  check-tag:
    if: ${{ !inputs.pages_only }}
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - name: Check tag for pre-release
        id: check
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Not a tag push — skipping pre-release detection"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-rc* ]] || [[ "$TAG" == *-alpha* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a pre-release"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a stable release"
          fi

  build:
    if: ${{ !inputs.pages_only }}
    needs: check-tag
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install build dependencies
        run: uv sync --group dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build with PyApp
        shell: bash
        run: uv run python scripts/build_pyapp.py --platform ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moon-traveler-${{ matrix.platform }}
          path: dist/moon-traveler-v*

  release:
    if: ${{ !inputs.pages_only }}
    needs: [check-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ needs.check-tag.outputs.is_prerelease == 'true' }}
          files: |
            artifacts/**/*

  # Deploy pages from main — only on stable releases or standalone dispatch
  deploy-pages:
    needs: [check-tag, release]
    if: >-
      always() && (
        inputs.pages_only ||
        (needs.release.result == 'success' && needs.check-tag.outputs.is_prerelease != 'true')
      )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/*.html docs/*.css _site/
          cp -r assets _site/assets

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
