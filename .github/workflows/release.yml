name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      pages_only:
        description: "Deploy pages only (skip build+release)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ !inputs.pages_only }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install build dependencies
        run: uv sync --group dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build with PyApp
        shell: bash
        run: uv run python scripts/build_pyapp.py --platform ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moon-traveler-${{ matrix.platform }}
          path: dist/moon-traveler-v*

  release:
    if: ${{ !inputs.pages_only }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*

  # On tag pushes, trigger a separate pages deploy from main
  # (direct deploy from tag ref is blocked by environment protection rules)
  trigger-pages:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pages deploy from main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml --ref main -f pages_only=true -R "$GITHUB_REPOSITORY"

  # Direct pages deploy — only runs from main ref (workflow_dispatch)
  deploy-pages:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/*.html docs/*.css _site/
          cp -r assets _site/assets

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
