<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="splashbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060618"/>
      <stop offset="100%" stop-color="#1a2a4e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#splashbg)"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="70" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="300" cy="25" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="500" cy="50" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="650" cy="35" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="750" cy="65" r="1.5" fill="#fff" opacity="0.4"/>
  <!-- Saturn (small) -->
  <ellipse cx="680" cy="100" rx="30" ry="27" fill="#c4a35a" opacity="0.4"/>
  <ellipse cx="680" cy="100" rx="50" ry="7" fill="none" stroke="#c4a35a" stroke-width="1.5" opacity="0.3" transform="rotate(-15 680 100)"/>
  <!-- Title -->
  <text x="400" y="170" text-anchor="middle" font-family="monospace, Courier" font-size="48" font-weight="bold" fill="#4af0f0" letter-spacing="3">MOON TRAVELER</text>
  <text x="400" y="205" text-anchor="middle" font-family="monospace" font-size="14" fill="#666" letter-spacing="10">CLI EDITION</text>
  <!-- Ice terrain -->
  <path d="M0 300 Q200 280 400 295 Q600 310 800 290 L800 400 L0 400 Z" fill="#2a4a6a" opacity="0.6"/>
  <!-- Crashed ship silhouette -->
  <rect x="350" y="290" width="50" height="18" rx="4" fill="#444" transform="rotate(-6 375 299)"/>
  <!-- Drone -->
  <rect x="420" y="270" width="10" height="5" rx="2" fill="#d55fde"/>
  <line x1="425" y1="275" x2="425" y2="283" stroke="#d55fde" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>
  <!-- Loading text -->
  <text x="400" y="360" text-anchor="middle" font-family="monospace" font-size="13" fill="#888">Initializing ARIA systems...</text>
  <!-- Version -->
  <text x="400" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">v0.1.0</text>
</svg>
